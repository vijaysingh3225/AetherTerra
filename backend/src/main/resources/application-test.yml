# Datasource is provided at runtime by Testcontainers @ServiceConnection — no URL needed here.
spring:
  flyway:
    clean-on-validation-error: true
  mail:
    host: localhost
    port: 1025
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

logging:
  level:
    com.aetherterra: INFO
    org.flywaydb: INFO

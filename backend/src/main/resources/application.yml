spring:
  application:
    name: aetherterra-backend
  profiles:
    active: local
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

aetherterra:
  jwt:
    secret: ${JWT_SECRET:aetherterra-dev-local-jwt-secret-key-for-development-only-2026}
    expiry-seconds: ${JWT_EXPIRY_SECONDS:86400}
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

server:
  port: 8080
  error:
    include-message: on-param

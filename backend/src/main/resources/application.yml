spring:
  application:
    name: aetherterra-backend
  profiles:
    active: local
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: false
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

aetherterra:
  jwt:
    secret: ${JWT_SECRET:aetherterra-dev-local-jwt-secret-key-for-development-only-2026}
    expiry-seconds: ${JWT_EXPIRY_SECONDS:86400}
  app:
    base-url: ${APP_BASE_URL:http://localhost:5173}
  mail:
    from: ${MAIL_FROM:noreply@aetherterra.local}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  shopify:
    shop-domain: ${SHOPIFY_SHOP_DOMAIN:}
    api-version: ${SHOPIFY_API_VERSION:2025-01}
    access-token: ${SHOPIFY_ACCESS_TOKEN:}
    mock-mode: ${SHOPIFY_MOCK_MODE:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

server:
  port: 8080
  error:
    include-message: on-param

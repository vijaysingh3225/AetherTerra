services:
  postgres:
    image: postgres:16-alpine
    container_name: aetherterra-postgres
    environment:
      POSTGRES_DB: aetherterra
      POSTGRES_USER: aetherterra
      POSTGRES_PASSWORD: aetherterra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aetherterra"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: aetherterra-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

volumes:
  postgres_data:
